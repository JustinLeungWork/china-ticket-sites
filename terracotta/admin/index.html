<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #6B3200;
    --brand-light: #f5ede5;
    --border: #e5e7eb;
    --muted: #6b7280;
    --surface: #f9fafb;
    --white: #fff;
    --red: #dc2626;
    --green: #16a34a;
    --yellow: #ca8a04;
    --blue: #2563eb;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 14px; background: #f3f4f6; color: #111; }

  /* ── Header ── */
  .header { background: var(--brand); color: #fff; padding: 0 24px; display: flex; align-items: center; gap: 16px; min-height: 52px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-weight: 700; font-size: 15px; letter-spacing: .02em; white-space: nowrap; }
  .site-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  .site-tabs::-webkit-scrollbar { display: none; }
  .site-tab { padding: 6px 14px; border-radius: 4px 4px 0 0; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); white-space: nowrap; transition: background .15s,color .15s; }
  .site-tab:hover { background: rgba(255,255,255,.22); color: #fff; }
  .site-tab.active { background: #fff; color: var(--brand); }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .btn-sm { padding: 5px 12px; border-radius: 5px; border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.12); color: #fff; font-size: 12px; cursor: pointer; transition: background .15s; }
  .btn-sm:hover { background: rgba(255,255,255,.25); }
  .btn-sm.active { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }

  /* ── Env bar ── */
  .env-bar { padding: 8px 24px; background: #fff; border-bottom: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; font-size: 12px; color: var(--muted); }
  .env-pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); }
  .env-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-ok { background: var(--green); }
  .dot-warn { background: var(--yellow); }
  .dot-err { background: var(--red); }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; padding: 20px 24px 0; }
  .stat { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 700; color: #111; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── Table area ── */
  .table-wrap { margin: 20px 24px 40px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
  .table-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-title { font-weight: 600; font-size: 14px; }
  .filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--white); cursor: pointer; }
  .search-input { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px; width: 180px; }
  .btn-refresh { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); cursor: pointer; }
  .btn-refresh:hover { background: var(--border); }

  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); border-bottom: 2px solid var(--border); background: var(--surface); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-green  { background: #dcfce7; color: #166534; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-red    { background: #fee2e2; color: #991b1b; }
  .badge-blue   { background: #dbeafe; color: #1e40af; }
  .badge-gray   { background: #f3f4f6; color: #374151; }


  /* ── Guide send ── */
  .btn-guide { font-size: 12px; padding: 5px 10px; border-radius: 5px; border: 1px solid transparent; cursor: pointer; font-weight: 600; white-space: nowrap; }
  .btn-guide-send { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-guide-send:hover { opacity: .85; }
  .btn-guide-sent { background: #f0fdf4; color: var(--green); border-color: #bbf7d0; }
  .btn-guide-paid { background: #dcfce7; color: #166534; border-color: #86efac; cursor: default; }
  .btn-guide-na   { background: var(--surface); color: var(--muted); border-color: var(--border); cursor: default; font-weight: 400; }

  /* ── Error box ── */
  .error-box { margin: 20px 24px; padding: 14px 18px; background: #fff3f3; border: 1px solid #f5c2c7; border-radius: var(--radius); color: var(--red); font-size: 13px; }

  /* ── Toast ── */
  #toast { position: fixed; right: 20px; bottom: 20px; max-width: 440px; background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--green); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 6px 24px rgba(0,0,0,.14); display: none; font-size: 13px; line-height: 1.5; z-index: 100; }
  #toast.err { border-left-color: var(--red); }
  #toast a { color: var(--brand); word-break: break-all; }

  /* ── Empty / loading ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .loading { text-align: center; padding: 48px; color: var(--muted); }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .header { padding: 0 12px; }
    .stats { padding: 12px 12px 0; }
    .table-wrap { margin: 12px 12px 32px; }
    .env-bar { padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Admin</span>
  <div class="site-tabs" id="siteTabs"></div>
  <div class="header-actions">
    <button class="btn-sm" id="btnStripe" onclick="toggleStripe()">+ Stripe</button>
    <button class="btn-sm" onclick="load()">Refresh</button>
  </div>
</div>

<div class="env-bar" id="envBar">Loading…</div>

<div class="stats" id="stats"></div>

<div id="errorBox"></div>

<div class="table-wrap">
  <div class="table-head">
    <span class="table-title">Bookings</span>
    <div class="filter-row">
      <input class="search-input" id="searchInput" placeholder="Search invoice / email…" oninput="renderTable()">
      <select class="filter-select" id="filterStatus" onchange="renderTable()">
        <option value="">All statuses</option>
        <option value="confirmed">Confirmed</option>
        <option value="pending">Pending</option>
      </select>
      <select class="filter-select" id="filterGuide" onchange="renderTable()">
        <option value="">All guide</option>
        <option value="requested">Guide requested</option>
        <option value="link_sent">Link sent</option>
        <option value="paid">Guide paid</option>
      </select>
      <button class="btn-refresh" onclick="load()">↺ Refresh</button>
    </div>
  </div>
  <div id="tableBody">
    <div class="loading"><div class="spinner"></div><br>Loading…</div>
  </div>
</div>

<div id="toast"></div>

<script>
let allBookings = [];
let currentSite = '';
let currentSiteConfig = { name: '', color: '#6B3200', guideCents: 15000 };
let withStripe = false;
let sites = [];

function fmt(cents, currency) {
  if (!cents) return '—';
  const c = (currency || 'usd').toUpperCase();
  return (cents / 100).toLocaleString('en-US', { style: 'currency', currency: c, maximumFractionDigits: 0 });
}
function fmtDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  return isNaN(d) ? v : d.toISOString().slice(0,10);
}
function fmtDateTime(v) {
  if (!v) return '—';
  const d = new Date(v);
  return isNaN(d) ? v : d.toISOString().slice(0,16).replace('T',' ');
}
function fmtRemaining(ms) {
  if (ms <= 0) return 'expired';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m left` : `${m}m left`;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setBrandColor(color) { document.documentElement.style.setProperty('--brand', color); }

async function fetchSites() {
  const r = await fetch('/api/sites').then(x=>x.json()).catch(()=>({ sites:[{id:'terracotta',name:'Terracotta',color:'#6B3200',env:{}}], default:'terracotta' }));
  sites = r.sites || [];
  if (!currentSite) currentSite = r.default || (sites[0]||{}).id || '';
  renderTabs();
}

function renderTabs() {
  document.getElementById('siteTabs').innerHTML = sites.map(s =>
    `<button class="site-tab${s.id===currentSite?' active':''}" onclick="switchSite('${esc(s.id)}')">${esc(s.name)}</button>`
  ).join('');
}

function switchSite(id) { currentSite = id; renderTabs(); load(); }

function toggleStripe() {
  withStripe = !withStripe;
  document.getElementById('btnStripe').classList.toggle('active', withStripe);
  load();
}

async function load() {
  document.getElementById('tableBody').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading…</div>';
  document.getElementById('errorBox').innerHTML = '';

  const qs = `?site=${encodeURIComponent(currentSite)}${withStripe?'&stripe=1':''}`;
  const data = await fetch('/api/bookings'+qs)
    .then(r=>r.json())
    .catch(e=>({ ok:false, error:e.message, bookings:[], env:{} }));

  if (data.dbError) {
    document.getElementById('errorBox').innerHTML = `<div class="error-box">
      <strong>DB error:</strong> ${esc(data.dbError)}<br><br>
      Fix: copy the Neon connection string from your Neon dashboard into <code>terracotta/.env</code>
      as <code>DATABASE_URL=postgresql://...</code> and restart <code>npm run admin</code>.
    </div>`;
  }

  currentSiteConfig = data.site || currentSiteConfig;
  setBrandColor(currentSiteConfig.color || '#6B3200');
  renderEnv(data.env || {});
  allBookings = data.bookings || [];
  renderStats();
  renderTable();
}

function pill(ok, okLabel, errLabel, dotClass) {
  const d = dotClass || (ok ? 'dot-ok' : 'dot-err');
  return `<span class="env-pill"><span class="dot ${d}"></span>${esc(ok ? okLabel : errLabel)}</span>`;
}
function renderEnv(env) {
  const stripeLabel = env.stripe === 'live' ? 'Stripe live' : env.stripe === 'test' ? 'Stripe test' : 'Stripe MISSING';
  const stripeDot   = env.stripe === 'live' ? 'dot-ok' : env.stripe === 'test' ? 'dot-warn' : 'dot-err';
  document.getElementById('envBar').innerHTML = [
    pill(env.db,      'DB ok',     'DB MISSING'),
    pill(!!env.stripe, stripeLabel, stripeLabel, stripeDot),
    pill(env.resend,  'Resend ok', 'Resend MISSING'),
    env.from     ? `<span class="env-pill"><span class="dot dot-ok"></span>from: bookings@${esc(env.from)}</span>` : '',
    env.operator ? `<span class="env-pill"><span class="dot dot-ok"></span>ops: ${esc(env.operator)}</span>` : '',
  ].filter(Boolean).join(' ');
}

function renderStats() {
  const bs = allBookings;
  const confirmed  = bs.filter(b=>b.status==='confirmed');
  const guidePaid  = bs.filter(b=>b.guide_status==='paid');
  const rev        = confirmed.reduce((s,b)=>s+(b.amount_cents||0),0);
  const guideRev   = guidePaid.reduce((s,b)=>s+(b.guide_amount_cents||0),0);
  const siteName   = currentSiteConfig.name || currentSite;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Bookings</div><div class="stat-val">${bs.length}</div><div class="stat-sub">${esc(siteName)}</div></div>
    <div class="stat"><div class="stat-label">Admissions paid</div><div class="stat-val">${confirmed.length}</div><div class="stat-sub">${fmt(rev,'usd')}</div></div>
    <div class="stat"><div class="stat-label">Guide requested</div><div class="stat-val">${bs.filter(b=>b.guide_requested).length}</div><div class="stat-sub">pending upsell</div></div>
    <div class="stat"><div class="stat-label">Guide paid</div><div class="stat-val">${guidePaid.length}</div><div class="stat-sub">${fmt(guideRev,'usd')}</div></div>
    <div class="stat"><div class="stat-label">Total revenue</div><div class="stat-val">${fmt(rev+guideRev,'usd')}</div><div class="stat-sub">admissions + guides</div></div>`;
}

function renderTable() {
  const q   = (document.getElementById('searchInput').value||'').toLowerCase();
  const fSt = document.getElementById('filterStatus').value;
  const fGu = document.getElementById('filterGuide').value;

  const rows = allBookings.filter(b => {
    if (q && !String(b.invoice_id||'').toLowerCase().includes(q) && !String(b.email||'').toLowerCase().includes(q)) return false;
    if (fSt && b.status !== fSt) return false;
    if (fGu === 'requested' && !b.guide_requested) return false;
    if (fGu === 'link_sent' && b.guide_status !== 'link_sent') return false;
    if (fGu === 'paid' && b.guide_status !== 'paid') return false;
    return true;
  });

  if (!rows.length) {
    document.getElementById('tableBody').innerHTML =
      `<div class="empty">No bookings found${q||fSt||fGu?' — try clearing filters':''}.</div>`;
    return;
  }

  const stripeHeader = withStripe ? '<th>Stripe</th>' : '';
  document.getElementById('tableBody').innerHTML = `<table>
    <thead><tr>
      <th>Invoice</th><th>Booked</th><th>Visit date</th><th>Slot</th>
      <th>Pax</th><th>Email</th><th>Status</th>${stripeHeader}
      <th>Amount</th><th>Name</th><th>Passport #</th><th>DOB</th><th>Guide</th><th>Info email</th>
    </tr></thead>
    <tbody>${rows.map(rowHtml).join('')}</tbody>
  </table>`;
}

function rowHtml(b) {
  const status = b.status === 'confirmed'
    ? '<span class="badge badge-green">Confirmed</span>'
    : '<span class="badge badge-yellow">Pending</span>';

  const stripeCell = withStripe ? `<td>${
    b.stripe_admission_status
      ? `<span class="badge ${b.stripe_admission_status==='paid'?'badge-green':'badge-yellow'}">${esc(b.stripe_admission_status)}</span>`
      : '—'
  }</td>` : '';

  let visitors = [];
  if (b.passport_data) {
    try {
      const parsed = (typeof b.passport_data === 'string') ? JSON.parse(b.passport_data) : b.passport_data;
      visitors = Array.isArray(parsed) ? parsed : [parsed];
    } catch { visitors = []; }
  }
  const ppCol = field => visitors.length
    ? visitors.map(p => `<div style="font-size:12px;line-height:1.7">${esc(String(p[field]||'—'))}</div>`).join('')
    : '<span style="color:var(--muted)">—</span>';

  return `<tr>
    <td><strong>${esc(b.invoice_id)}</strong></td>
    <td style="color:var(--muted);font-size:12px">${fmtDateTime(b.created_at)}</td>
    <td>${fmtDate(b.visit_date)}</td>
    <td>${esc(b.time_slot||'—')}</td>
    <td style="text-align:center">${b.visitor_qty||'—'}</td>
    <td><a href="mailto:${esc(b.email)}" style="color:var(--brand)">${esc(b.email)}</a></td>
    <td>${status}</td>
    ${stripeCell}
    <td>${fmt(b.amount_cents, b.currency)}</td>
    <td>${ppCol('name')}</td>
    <td style="font-family:monospace">${ppCol('passportNumber')}</td>
    <td>${ppCol('dateOfBirth')}</td>
    <td>${guideHtml(b)}</td>
    <td>${guideInfoHtml(b)}</td>
  </tr>`;
}

function guideHtml(b) {
  const id  = b.invoice_id;
  const sid = id.replace(/\W/g,'');
  const notes        = b.guide_notes || '';
  const agencyChecked = !!b.guide_agency_checked;
  const price = `$${(currentSiteConfig.guideCents/100).toFixed(0)}`;

  // compact agency + notes always shown when guide was requested
  const metaRow = (show) => !show ? '' :
    `<div style="display:flex;align-items:center;gap:6px;margin-top:5px">
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0">
        <input type="checkbox" ${agencyChecked?'checked':''} onchange="patchBooking('${esc(id)}',{agency_checked:this.checked})">
        Agency
      </label>
      <input type="text" value="${esc(notes)}"
        style="flex:1;min-width:60px;max-width:140px;font-size:11px;padding:2px 5px;border:1px solid var(--border);border-radius:3px;color:#555"
        placeholder="Notes…"
        onblur="patchBooking('${esc(id)}',{notes:this.value})">
    </div>`;

  if (!b.guide_requested) return `<span style="color:var(--muted);font-size:12px">—</span>`;

  const gs  = b.guide_status;
  const pax = b.guide_size ? `${b.guide_size} pax` : '';

  if (gs === 'paid') {
    return `<div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="badge badge-green">Paid</span>
        <span style="font-size:11px;color:var(--muted)">${fmt(b.guide_amount_cents,'usd')} · ${fmtDate(b.guide_paid_at)}</span>
      </div>
      ${metaRow(true)}
    </div>`;
  }

  if (gs === 'link_sent') {
    const sentMs    = b.guide_link_sent_at ? new Date(b.guide_link_sent_at).getTime() : 0;
    const expiresMs = sentMs + 23 * 3600 * 1000;
    const remaining = expiresMs - Date.now();
    const expired   = remaining <= 0;
    const badge     = expired ? '<span class="badge badge-red">Expired</span>' : '<span class="badge badge-blue">Sent</span>';
    const timeLabel = expired
      ? `<span style="font-size:11px;color:var(--muted)">${fmtDateTime(b.guide_link_sent_at)}</span>`
      : `<span style="font-size:11px;color:var(--muted)">${fmtDateTime(b.guide_link_sent_at)}</span>
         <span style="font-size:11px;color:var(--yellow)">${fmtRemaining(remaining)}</span>`;
    const paxLabel = pax ? `<span style="font-size:11px;color:var(--muted)">${pax}</span>` : '';
    return `<div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        ${badge}${timeLabel}${paxLabel}
        <button class="btn-guide btn-guide-send" style="padding:2px 8px;font-size:11px" onclick="sendGuide('${esc(id)}',this)">Resend</button>
      </div>
      ${metaRow(true)}
    </div>`;
  }

  // requested, not yet sent
  return `<div>
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      <span class="badge badge-yellow">Requested</span>
      ${pax ? `<span style="font-size:11px;color:var(--muted)">${pax}</span>` : ''}
      <button class="btn-guide btn-guide-send" style="padding:2px 8px;font-size:11px" onclick="sendGuide('${esc(id)}',this)">Send ${price}</button>
    </div>
    ${metaRow(true)}
  </div>`;
}


let toastTimer;
function toast(html, isErr) {
  const t = document.getElementById('toast');
  t.innerHTML = html; t.className = isErr ? 'err' : '';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display='none'; }, isErr ? 30000 : 14000);
}

async function sendGuide(invoiceId, btn) {
  const price = `$${(currentSiteConfig.guideCents/100).toFixed(0)}`;
  if (!confirm(`Send the ${price} private-guide payment link for ${invoiceId} to the customer?`)) return;
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/guide-link', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ invoice: invoiceId, site: currentSite }),
    }).then(x=>x.json());
    if (!r.ok) throw new Error(r.error || 'failed');
    const note = r.emailed
      ? `Emailed to <strong>${esc(r.email)}</strong>.`
      : `<strong style="color:var(--red)">Email failed</strong> (${esc(r.emailError||'?')}). Manual link:<br><a href="${esc(r.url)}" target="_blank">${esc(r.url)}</a>`;
    toast(`Guide link created for ${esc(invoiceId)}.<br>${note}`, !r.emailed);
    await load();
  } catch(e) {
    toast('Error: ' + esc(e.message), true);
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function guideInfoHtml(b) {
  const id   = b.invoice_id;
  const sent = b.guide_info_sent_at;
  if (sent) {
    return `<div style="display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="badge badge-gray">Sent</span>
        <span style="font-size:11px;color:var(--muted)">${fmtDate(sent)}</span>
      </div>
      <button class="btn-guide btn-guide-send" style="padding:2px 8px;font-size:11px" onclick="sendGuideInfo('${esc(id)}',this)">Resend</button>
    </div>`;
  }
  return `<button class="btn-guide btn-guide-send" style="padding:2px 8px;font-size:11px" onclick="sendGuideInfo('${esc(id)}',this)">Send info</button>`;
}

async function sendGuideInfo(invoiceId, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/guide-info', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ invoice: invoiceId, site: currentSite }),
    }).then(x => x.json());
    if (!r.ok) throw new Error(r.error || 'failed');
    const note = r.emailed
      ? `Info email sent to <strong>${esc(r.email)}</strong>.`
      : `<strong style="color:var(--red)">Email failed</strong> (${esc(r.emailError||'?')})`;
    toast(note, !r.emailed);
    if (r.emailed) await load();
    else { btn.disabled = false; btn.textContent = orig; }
  } catch(e) {
    toast('Error: ' + esc(e.message), true);
    btn.disabled = false;
    btn.textContent = orig;
  }
}

async function patchBooking(invoiceId, patch) {
  try {
    const r = await fetch('/api/booking', {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ invoice: invoiceId, site: currentSite, ...patch }),
    }).then(x => x.json());
    if (!r.ok) toast('Save failed: ' + esc(r.error || 'unknown'), true);
    // Update local state so re-render reflects change without a full reload
    const b = allBookings.find(x => x.invoice_id === invoiceId);
    if (b) {
      if ('agency_checked' in patch) b.guide_agency_checked = patch.agency_checked ? new Date().toISOString() : null;
      if ('notes' in patch) b.guide_notes = patch.notes;
    }
  } catch(e) {
    toast('Save failed: ' + esc(e.message), true);
  }
}

(async () => {
  await fetchSites();
  load();
})();
</script>
