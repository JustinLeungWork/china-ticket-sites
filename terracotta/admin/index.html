<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terracotta Tickets — Admin</title>
<style>
  :root { --primary:#6B3200; --accent:#C8960C; --bg:#f4f1ec; --card:#fff; --line:#e6e0d6; --text:#2a2118; --muted:#6f6354; --ok:#2e7d32; --warn:#b8860b; --pending:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--primary); color:#fff; padding:16px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:18px; font-weight:600; }
  header .brand-sub { opacity:.75; font-size:12px; }
  .env { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
  .chip { font-size:11px; padding:3px 9px; border-radius:20px; background:rgba(255,255,255,.15); }
  .chip.bad { background:#b3261e; }
  .chip.live { background:var(--accent); color:#3a2a00; font-weight:700; }
  .wrap { padding:24px; max-width:1280px; margin:0 auto; }
  .toolbar { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  button { font:inherit; cursor:pointer; border:none; border-radius:6px; padding:9px 16px; background:var(--primary); color:#fff; font-weight:600; }
  button.sm { padding:6px 12px; font-size:12.5px; }
  button.ghost { background:#fff; color:var(--primary); border:1px solid var(--line); }
  button.guide { background:var(--accent); color:#3a2a00; }
  button:disabled { opacity:.5; cursor:default; }
  label.toggle { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); cursor:pointer; }
  .stats { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 18px; min-width:120px; }
  .stat .n { font-size:24px; font-weight:700; color:var(--primary); }
  .stat .l { font-size:12px; color:var(--muted); margin-top:2px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  th, td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); background:#faf8f4; }
  tr:last-child td { border-bottom:none; }
  td.mono { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; }
  .badge { display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .b-paid { background:#e3f3e4; color:var(--ok); }
  .b-pending { background:#eee; color:var(--pending); }
  .b-req { background:#fff3d6; color:var(--warn); }
  .b-sent { background:#e0ecff; color:#1c5fd0; }
  .b-none { color:#bbb; }
  .muted { color:var(--muted); }
  .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .pp { margin-top:8px; background:#faf8f4; border:1px solid var(--line); border-radius:6px; padding:8px 10px; font-size:12.5px; display:none; }
  .pp.show { display:block; }
  .pp div { padding:2px 0; }
  #toast { position:fixed; right:20px; bottom:20px; max-width:440px; background:#fff; border:1px solid var(--line); border-left:4px solid var(--ok); border-radius:8px; padding:14px 16px; box-shadow:0 6px 24px rgba(0,0,0,.14); display:none; font-size:13px; line-height:1.5; }
  #toast.err { border-left-color:#b3261e; }
  #toast a { color:var(--primary); word-break:break-all; }
  .empty { text-align:center; padding:48px; color:var(--muted); }
  .spin { opacity:.5; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Terracotta Tickets · Admin</h1>
    <div class="brand-sub">Bookings & private-guide billing — local only</div>
  </div>
  <div class="env" id="env"></div>
</header>

<div class="wrap">
  <div class="toolbar">
    <button id="refresh" class="ghost">↻ Refresh</button>
    <label class="toggle"><input type="checkbox" id="stripeChk"> Cross-check Stripe (slower)</label>
    <span class="muted" id="updated"></span>
  </div>

  <div class="stats" id="stats"></div>

  <table id="tbl">
    <thead>
      <tr>
        <th>Created</th><th>Invoice</th><th>Visit date</th><th>Customer</th>
        <th>Pax</th><th>Paid</th><th>Admission</th><th>Guide</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="rows"><tr><td colspan="9" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let BOOKINGS = [];

function badge(status) {
  if (status === 'paid')      return '<span class="badge b-paid">paid</span>';
  if (status === 'pending')   return '<span class="badge b-pending">pending</span>';
  if (status === 'requested') return '<span class="badge b-req">requested</span>';
  if (status === 'link_sent') return '<span class="badge b-sent">link sent</span>';
  return '<span class="b-none">—</span>';
}
function fmtDT(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
function money(c) { return c == null ? '—' : '$' + (c/100).toFixed(2); }

function renderEnv(e) {
  if (!e) return;
  const chip = (label, ok, cls='') => `<span class="chip ${ok ? cls : 'bad'}">${label}: ${ok ? (typeof ok==='string'?ok:'ok') : 'missing'}</span>`;
  $('env').innerHTML =
    chip('DB', e.DATABASE_URL) +
    chip('Stripe', e.STRIPE_SECRET_KEY, e.STRIPE_SECRET_KEY==='live'?'live':'') +
    chip('Resend', e.RESEND_API_KEY) +
    `<span class="chip">from: ${e.EMAIL_DOMAIN||'??'}</span>`;
}

function renderStats() {
  const total = BOOKINGS.length;
  const paid = BOOKINGS.filter(b => b.status==='paid').length;
  const gReq = BOOKINGS.filter(b => b.guide_status==='requested' || b.guide_status==='link_sent').length;
  const gPaid = BOOKINGS.filter(b => b.guide_status==='paid').length;
  const rev = BOOKINGS.filter(b=>b.status==='paid').reduce((s,b)=>s+(b.amount_cents||0),0)
            + BOOKINGS.filter(b=>b.guide_status==='paid').reduce((s,b)=>s+(b.guide_amount_cents||0),0);
  const S = [[total,'Bookings'],[paid,'Admissions paid'],[gReq,'Guide pending'],[gPaid,'Guide paid'],[money(rev),'Revenue (paid)']];
  $('stats').innerHTML = S.map(([n,l])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}

function ppHtml(b) {
  const v = Array.isArray(b.passport_data) ? b.passport_data : [];
  if (!v.length) return `<div class="pp" id="pp-${b.invoice_id}"><span class="muted">No passport data on file (purged or stored in Stripe fallback).</span></div>`;
  return `<div class="pp" id="pp-${b.invoice_id}">` + v.map((p,i)=>`<div><strong>#${i+1}</strong> ${p.name||'?'} · ${p.passportNumber||'?'} · DOB ${p.dateOfBirth||'?'}</div>`).join('') + `</div>`;
}

function guideCell(b) {
  if (b.guide_status === 'paid') return badge('paid');
  if (b.guide_status === 'link_sent') return badge('link_sent') + `<div class="muted" style="font-size:11px;margin-top:3px">sent ${fmtDT(b.guide_link_sent_at)}</div>`;
  if (b.guide_status === 'requested') return badge('requested');
  return badge(null);
}
function guideAction(b) {
  if (b.guide_status === 'paid') return '';
  const label = b.guide_status === 'link_sent' ? 'Resend $150 link' : 'Send $150 link';
  return `<button class="sm guide" onclick="sendGuide('${b.invoice_id}', this)">${label}</button>`;
}

function render() {
  renderStats();
  if (!BOOKINGS.length) { $('rows').innerHTML = '<tr><td colspan="9" class="empty">No bookings yet.</td></tr>'; return; }
  $('rows').innerHTML = BOOKINGS.map(b => {
    const adm = b.stripe_admission_status ? `${badge(b.status)} <span class="muted" style="font-size:11px">(stripe: ${b.stripe_admission_status})</span>` : badge(b.status);
    return `<tr>
      <td class="muted">${fmtDT(b.created_at)}</td>
      <td class="mono">${b.invoice_id}</td>
      <td>${(b.visit_date||'').slice(0,10)}${b.time_slot ? `<div class="muted" style="font-size:11px">${b.time_slot}</div>` : ''}</td>
      <td>${b.email||'—'}${ppHtml(b)}</td>
      <td>${b.visitor_qty}</td>
      <td>${money(b.amount_cents)}</td>
      <td>${adm}</td>
      <td>${guideCell(b)}</td>
      <td><div class="row-actions">
        <button class="sm ghost" onclick="document.getElementById('pp-${b.invoice_id}').classList.toggle('show')">Passports</button>
        ${guideAction(b)}
      </div></td>
    </tr>`;
  }).join('');
}

async function load() {
  $('refresh').disabled = true; $('tbl').classList.add('spin');
  try {
    const stripe = $('stripeChk').checked ? '?stripe=1' : '';
    const r = await fetch('/api/bookings' + stripe);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'failed');
    BOOKINGS = data.bookings || [];
    renderEnv(data.env);
    render();
    if (data.dbError) $('rows').innerHTML = `<tr><td colspan="9" class="empty">DB error: ${data.dbError}<br><span class="muted">Add your Neon DATABASE_URL to terracotta/.env and restart.</span></td></tr>`;
    $('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('rows').innerHTML = `<tr><td colspan="9" class="empty">Error: ${e.message}</td></tr>`;
  } finally {
    $('refresh').disabled = false; $('tbl').classList.remove('spin');
  }
}

async function sendGuide(invoice, btn) {
  if (!confirm(`Send the $150 private-guide payment link for ${invoice} to the customer's email?`)) return;
  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/guide-link', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ invoice }) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'failed');
    const emailNote = d.emailed ? `Emailed to <strong>${d.email}</strong>.` : `<strong style="color:#b3261e">Email NOT sent</strong> (${d.emailError||'unknown'}). Copy the link below and send it manually:`;
    toast(`Guide link created for ${invoice}.<br>${emailNote}<br><a href="${d.url}" target="_blank">${d.url}</a>`, !d.emailed);
    await load();
  } catch (e) {
    toast('Error: ' + e.message, true);
    btn.disabled = false; btn.textContent = orig;
  }
}

let toastTimer;
function toast(html, isErr) {
  const t = $('toast'); t.innerHTML = html; t.className = isErr ? 'err' : ''; t.style.display = 'block';
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>{ t.style.display='none'; }, isErr ? 30000 : 14000);
}

$('refresh').onclick = load;
$('stripeChk').onchange = load;
load();
</script>
</body>
</html>
