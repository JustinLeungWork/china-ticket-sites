<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Payment Cancelled — TerracottaWarriorsTickets.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root { --primary:#6B3200; --accent:#C8960C; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#f5f5f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; border-radius:8px; max-width:460px; width:100%; padding:48px 40px; text-align:center; box-shadow:0 2px 16px rgba(0,0,0,.08); }
  .icon { width:64px; height:64px; background:#eee; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
  .icon svg { width:28px; height:28px; fill:none; stroke:#999; stroke-width:2.5; stroke-linecap:round; }
  h1 { font-family:'Playfair Display',serif; color:var(--primary); font-size:24px; margin-bottom:12px; }
  p { color:#666; line-height:1.7; font-size:15px; margin-bottom:20px; }
  a.btn { display:inline-block; background:var(--primary); color:#fff; text-decoration:none; padding:13px 28px; border-radius:4px; font-size:14px; font-weight:500; }
  a.link { color:var(--primary); font-size:13px; text-decoration:none; display:block; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
  <h1>Payment Cancelled</h1>
  <p>No charge was made. Your session expired or you cancelled the checkout — that's fine, you can try again any time.</p>
  <a class="btn" href="/#book">Return to booking</a>
  <a class="link" href="mailto:hello@terracotta-tickets.com">Need help? hello@terracotta-tickets.com</a>
</div>
</body>
</html>
